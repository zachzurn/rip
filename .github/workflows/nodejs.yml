name: Node.js Native Addon

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build: npx napi build --platform --release --target x86_64-pc-windows-msvc

          - os: macos-latest
            target: x86_64-apple-darwin
            build: npx napi build --platform --release --target x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin
            build: npx napi build --platform --release --target aarch64-apple-darwin

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npx napi build --platform --release --target x86_64-unknown-linux-gnu --use-napi-cross

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npx napi build --platform --release --target aarch64-unknown-linux-gnu --use-napi-cross

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: npx napi build --platform --release --target x86_64-unknown-linux-musl -x

    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install zig (musl targets)
        if: contains(matrix.target, 'musl')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild (musl targets)
        if: contains(matrix.target, 'musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install npm dependencies
        working-directory: rip_nodejs
        run: npm install

      - name: Build native addon
        working-directory: rip_nodejs
        run: ${{ matrix.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: rip_nodejs/rip-nodejs.*.node
          if-no-files-found: error

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc

          - os: macos-latest
            target: x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    name: Test - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install npm dependencies
        working-directory: rip_nodejs
        run: npm install

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: rip_nodejs

      - name: Run smoke tests
        working-directory: rip_nodejs
        run: node test_smoke.mjs

      - name: Run resource tests
        working-directory: rip_nodejs
        run: node test_resources.mjs

  test-linux-musl:
    needs: build
    name: Test - x86_64-unknown-linux-musl
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: binding-x86_64-unknown-linux-musl
          path: rip_nodejs

      - name: Test in Alpine container
        uses: addnab/docker-run-action@v3
        with:
          image: node:24-alpine
          options: -v ${{ github.workspace }}:/work
          run: |
            cd /work/rip_nodejs
            npm install
            node test_smoke.mjs

  # Run full Rust test suite
  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --exclude rip_android

  # Publish to npm when a version tag is pushed
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-linux-musl, rust-tests]
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install npm dependencies
        working-directory: rip_nodejs
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: rip_nodejs/artifacts

      - name: Move artifacts to npm dirs
        working-directory: rip_nodejs
        run: npx napi artifacts

      - name: Publish platform packages
        working-directory: rip_nodejs
        run: npx napi prepublish -t npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish root package
        working-directory: rip_nodejs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
